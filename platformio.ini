[platformio]
default_envs = esp32doit-devkit-v1
; ↑ Thay bằng board mày muốn build mặc định

; ====================== Cấu hình chung cho tất cả môi trường ======================
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -Wl,-z,muldefs
    -D CORE_DEBUG_LEVEL=0          ; Tắt debug ESP32 để firmware nhỏ và nhanh hơn
    -D SERIAL_DEBUG                ; Bật Serial debug (định nghĩa trong definitions.h)
    -D ARDUINO_RUNNING_CORE=1      ; Chạy trên core 1 (tốt cho sniffer + web)

; Partition khuyến nghị cho Deauther (có web server)
board_build.partitions = min_spiffs.csv
; Nếu sau này thêm OLED hoặc nhiều data → đổi thành partitions.csv lớn hơn

; ====================== ESP32 DOIT DevKit V1 (Board phổ biến, khuyến nghị bắt đầu) ======================
[env:esp32doit-devkit-v1]
board = esp32doit-devkit-v1

; ====================== ESP32-S3 (Nhanh, nhiều RAM, phù hợp nếu có OLED) ======================
[env:esp32-s3-devkitm-1]
board = esp32-s3-devkitm-1

; ====================== ESP32-C3 (Nhỏ gọn, tiết kiệm điện) ======================
[env:adafruit_qtpy_esp32c3]
board = adafruit_qtpy_esp32c3

; ====================== Thêm board mới (nếu mày mua sau) ======================

; ESP32-C5 (Tốt nhất trong dòng ESP32 nếu muốn thử hỗ trợ 5GHz)
[env:esp32-c5-devkit]
board = esp32-c5-devkit

; ESP32-S3 có PSRAM (nếu board mày có PSRAM)
[env:esp32s3_psram]
board = esp32-s3-devkitc-1
board_build.psram = enabled